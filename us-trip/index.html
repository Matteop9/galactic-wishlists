<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #0f172a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      height: 56px;
      flex-shrink: 0;
      z-index: 200;
      gap: 0.5rem;
    }

    .nav-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.18); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    .trip-meta {
      text-align: center;
      flex: 1;
      min-width: 0;
    }
    .trip-meta h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #day-label {
      font-size: 0.78rem;
      color: #94a3b8;
      display: block;
      margin-top: 1px;
    }

    /* ── App body ── */
    #app-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #map {
      flex: 1;
      height: 100%;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 320px;
      flex-shrink: 0;
      background: #fff;
      border-left: 1px solid #e2e8f0;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: opacity 0.2s ease;
    }
    #sidebar.fading { opacity: 0; }

    .sb-location {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }
    .location-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: #0f172a;
    }
    .nights-badge {
      background: #2563eb;
      color: #fff;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .transport-line {
      font-size: 0.83rem;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f1f5f9;
      border-radius: 8px;
      padding: 8px 12px;
    }

    .birthday-banner {
      background: #fef3c7;
      border-left: 3px solid #f59e0b;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #92400e;
    }

    .note-banner {
      background: #f0fdf4;
      border-left: 3px solid #22c55e;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      color: #166534;
    }

    .sb-section {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 14px;
    }
    .sb-section-title {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #f59e0b;
      margin-bottom: 8px;
    }
    .sb-section ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sb-section ul li {
      font-size: 0.83rem;
      color: #334155;
      padding-left: 14px;
      position: relative;
      line-height: 1.4;
    }
    .sb-section ul li::before {
      content: '·';
      position: absolute;
      left: 0;
      color: #94a3b8;
    }

    .vibe-text {
      font-size: 0.83rem;
      color: #64748b;
      font-style: italic;
      line-height: 1.5;
    }

    /* ── Dot markers (DivIcon) ── */
    .dot-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dot-marker {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2563eb;
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
      transition: all 0.3s ease;
    }
    .dot-active {
      width: 18px;
      height: 18px;
      background: #f59e0b;
      box-shadow: 0 0 0 4px rgba(245,158,11,0.3), 0 1px 4px rgba(0,0,0,0.2);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 4px rgba(245,158,11,0.3), 0 1px 4px rgba(0,0,0,0.2); }
      50%       { box-shadow: 0 0 0 8px rgba(245,158,11,0.12), 0 1px 4px rgba(0,0,0,0.2); }
    }

    /* ── Character marker ── */
    .char-marker {
      font-size: 1.5rem;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      user-select: none;
      animation: float 2.5s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    /* ── Leaflet overrides ── */
    .leaflet-container { font-family: inherit; }

  /* ─────────────────────────────────────────────

  ───────────────────────────────────────────── */
  function getZoomForLocation(name) {
    const zooms = {
      'Las Vegas': 11,
      'Page, AZ': 12,
      'Grand Canyon': 11,
      'Williams / Route 66': 11,
      'Sedona': 12,
      'Phoenix': 11,
      'St Pete Beach': 12,
      'Orlando': 11,
    };
    return zooms[name] || 11;
  }

  /* ─────────────────────────────────────────────
     INIT MAP
  ───────────────────────────────────────────── */
  function initMap() {
    map = L.map('map', { zoomControl: true, attributionControl: true });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19,
      detectRetina: true,
    }).addTo(map);

    // Fit all stops in view on load
    const bounds = L.latLngBounds(STOPS.map(s => s.coords));
    map.fitBounds(bounds, { padding: [60, 60] });

    // Route polyline
    L.polyline(STOPS.map(s => s.coords), {
      color: '#2563eb',
      weight: 2.5,
      opacity: 0.5,
      dashArray: '6 4',
    }).addTo(map);

    // Location dot markers
    STOPS.forEach(stop => {
      const key = stop.coords.join(',');
      const marker = L.marker(stop.coords, {
        icon: L.divIcon({
          className: 'dot-wrap',
          html: `<div class="dot-marker" id="dot-${key}"></div>`,
          iconSize: [20, 20],
          iconAnchor: [10, 10],
        }),
        interactive: false,
      }).addTo(map);

      // Tooltip with stop name
      marker.bindTooltip(stop.name, { permanent: false, direction: 'top', offset: [0, -8] });
      dotMarkers[key] = stop.coords;
    });

    // Character marker
    characterMarker = L.marker(DAYS[0].coords, {
      icon: makeCharIcon(DAYS[0]),
      zIndexOffset: 1000,
      interactive: false,
    }).addTo(map);

    window.addEventListener('resize', () => map.invalidateSize());
  }

  /* ─────────────────────────────────────────────
     CHARACTER ICON
  ───────────────────────────────────────────── */
  function makeCharIcon(day) {
    let emoji = '📍';
    if (day.transport) {
      if (day.transport.mode === '✈️') emoji = '✈️';
      else if (day.transport.mode === '🚗') emoji = '🚗';
    }
    return L.divIcon({
      className: '',
      html: `<div class="char-marker">${emoji}</div>`,
      iconSize: [36, 36],
      iconAnchor: [18, 18],
    });
  }

  /* ─────────────────────────────────────────────
     UPDATE DOTS
  ───────────────────────────────────────────── */
  function updateDots(activeCoords) {
    const activeKey = activeCoords.join(',');
    Object.keys(dotMarkers).forEach(key => {
      const el = document.getElementById(`dot-${key}`);
      if (!el) return;
      if (key === activeKey) {
        el.classList.add('dot-active');
      } else {
        el.classList.remove('dot-active');
      }
    });
  }

      ${day.isFirstNight && day.nights ? `<span class="nights-badge">${day.nights} night${day.nights > 1 ? 's' : ''}</span>` : ''}

    html += `<div style="font-size:0.8rem;color:#64748b;">Day ${day.day} &nbsp;·&nbsp; ${day.date}</div>`;

    // Birthday banner
    if (day.birthday) {
      html += `<div class="birthday-banner">🎂 Happy Birthday! Special day ahead.</div>`;
    }

    // Note banner

      html += `<div class="note-banner">${day.note}</div>`;
    }

    // Transport

      html += `<div class="transport-line">${day.transport.mode} <span>${day.transport.label}</span></div>`;
    }

    // Vibe
    if (day.vibe) {
      html += `<p class="vibe-text">${day.vibe}</p>`;
    }

    // Activities
    if (day.activities && day.activities.length) {
      html += `<div class="sb-section">
        <div class="sb-section-title">Activities</div>
        <ul>${day.activities.map(a => `<li>${a}</li>`).join('')}</ul>
      </div>`;
    }

    // Food & drink
    if (day.food && day.food.length) {
      html += `<div class="sb-section">
        <div class="sb-section-title">Eat &amp; Drink</div>
        <ul>${day.food.map(f => `<li>${f}</li>`).join('')}</ul>
      </div>`;
    }

    // Stay
    if (day.stay && day.stay.length) {
      html += `<div class="sb-section">
        <div class="sb-section-title">Stay</div>
        <ul>${day.stay.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>`;
    }

    sb.innerHTML = html;
  }

  function updateSidebar(day) {
    const sb = document.getElementById('sidebar');
    sb.classList.add('fading');
    setTimeout(() => {
      renderSidebar(day);
      sb.classList.remove('fading');
    }, 180);
  }

  /* ─────────────────────────────────────────────
     GO TO DAY
  ───────────────────────────────────────────── */
  function goToDay(idx) {
    if (idx < 0 || idx >= DAYS.length) return;

    const prev = DAYS[currentDayIndex];
    currentDayIndex = idx;
    const day = DAYS[idx];

    // Header
    document.getElementById('day-label').textContent = `Day ${day.day} · ${day.date}`;

    // Buttons
    document.getElementById('btn-prev').disabled = idx === 0;
    document.getElementById('btn-next').disabled = idx === DAYS.length - 1;

    // Map — only flyTo if location changed
    const coordsChanged = prev.coords.join() !== day.coords.join();
    if (coordsChanged) {
      map.flyTo(day.coords, getZoomForLocation(day.location), { animate: true, duration: 1.2 });
      characterMarker.setLatLng(day.coords);
      characterMarker.setIcon(makeCharIcon(day));
    }

    updateDots(day.coords);
    updateSidebar(day);
  }

  /* ─────────────────────────────────────────────
     BOOT
  ───────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', () => {
    initMap();
    renderSidebar(DAYS[0]);
    updateDots(DAYS[0].coords);

    document.getElementById('btn-prev').addEventListener('click', () => goToDay(currentDayIndex - 1));
    document.getElementById('btn-next').addEventListener('click', () => goToDay(currentDayIndex + 1));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  goToDay(currentDayIndex - 1);
      if (e.key === 'ArrowRight') goToDay(currentDayIndex + 1);
    });

    // Init button states
    document.getElementById('btn-prev').disabled = true;
  });
</script>

</body>
</html>
