<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galactic Tycoons — Wishlists</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #space-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    header {
      position: relative;
      z-index: 1;
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(6px);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #30363d;
    }
    header h1 { font-size: 1.15rem; font-weight: 600; }
    header span { font-size: 0.8rem; color: #8b949e; margin-top: 2px; display: block; }
    .config-updated { font-size: 0.75rem; color: #484f58; text-align: center; margin-bottom: 16px; }

    .container {
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 20px;
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .run-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      background: #238636;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .run-btn:hover:not(:disabled) { background: #2ea043; }
    .run-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results { display: flex; flex-direction: column; gap: 10px; }

    .result-row {
      background: rgba(22, 27, 34, 0.85);
      backdrop-filter: blur(4px);
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: border-color 0.2s;
    }
    .result-row.success { border-color: #238636; }
    .result-row.error   { border-color: #f85149; }
    .result-row.loading { border-color: #388bfd; }

    .status-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }

    .result-body { flex: 1; min-width: 0; }
    .result-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
    .result-detail {
      font-size: 0.8rem;
      color: #8b949e;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .result-row.success .result-detail { color: #3fb950; }
    .result-row.error   .result-detail { color: #f85149; }
    .result-row.loading .result-detail { color: #388bfd; }

    .load-error {
      background: rgba(42, 13, 13, 0.9);
      border: 1px solid #f85149;
      border-radius: 10px;
      padding: 16px;
      color: #f85149;
      font-size: 0.9rem;
      margin-bottom: 20px;
      display: none;
    }

    .timestamp {
      margin-top: 20px;
      font-size: 0.75rem;
      color: #484f58;
      text-align: center;
    }
  </style>
</head>
<body>

<canvas id="space-canvas"></canvas>

<header>
  <div>
    <h1>Galactic Tycoons — Wishlists</h1>
    <span>Tap the button to add all items to every wishlist</span>
  </div>
</header>

<div class="container">
  <div class="load-error" id="loadError"></div>
  <div class="config-updated" id="configUpdated"></div>

  <button class="run-btn" id="runBtn" onclick="runAll()" disabled>
    <span class="spinner" id="spinner"></span>
    <span id="btnText">Loading config...</span>
  </button>

  <div class="results" id="results"></div>
  <div class="timestamp" id="timestamp"></div>
</div>

<script>
// ── Space background animation ──────────────────────────────
(function() {
  const canvas = document.getElementById('space-canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const rand = (a, b) => Math.random() * (b - a) + a;
  const randInt = (a, b) => Math.floor(rand(a, b));

  // ── Stars ────────────────────────────────────────────────
  const STAR_COUNT = 220;
  const stars = Array.from({ length: STAR_COUNT }, () => ({
    x: rand(0, 1), y: rand(0, 1),
    r: rand(0.4, 1.8),
    alpha: rand(0.3, 1),
    twinkleSpeed: rand(0.005, 0.02),
    twinkleDir: Math.random() > 0.5 ? 1 : -1,
    color: ['#fff', '#cce0ff', '#ffd8a8', '#d4aaff'][randInt(0, 4)]
  }));

  function drawStars() {
    stars.forEach(s => {
      s.alpha += s.twinkleSpeed * s.twinkleDir;
      if (s.alpha >= 1)   { s.alpha = 1;   s.twinkleDir = -1; }
      if (s.alpha <= 0.1) { s.alpha = 0.1; s.twinkleDir =  1; }
      ctx.globalAlpha = s.alpha;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // ── Shooting stars ───────────────────────────────────────
  const shooters = [];
  function spawnShooter() {
    const angle = rand(20, 45) * Math.PI / 180;
    shooters.push({
      x: rand(0, canvas.width),
      y: rand(0, canvas.height * 0.5),
      len: rand(80, 200),
      speed: rand(12, 22),
      angle,
      dx: Math.cos(angle),
      dy: Math.sin(angle),
      alpha: 1,
      width: rand(1, 2.5)
    });
  }
  setInterval(spawnShooter, rand(800, 1800));

  function drawShooters() {
    for (let i = shooters.length - 1; i >= 0; i--) {
      const s = shooters[i];
      s.x += s.dx * s.speed;
      s.y += s.dy * s.speed;
      s.alpha -= 0.025;
      if (s.alpha <= 0) { shooters.splice(i, 1); continue; }

      const grad = ctx.createLinearGradient(
        s.x, s.y,
        s.x - s.dx * s.len, s.y - s.dy * s.len
      );
      grad.addColorStop(0, `rgba(255,255,255,${s.alpha})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');

      ctx.globalAlpha = 1;
      ctx.strokeStyle = grad;
      ctx.lineWidth = s.width;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - s.dx * s.len, s.y - s.dy * s.len);
      ctx.stroke();
    }
  }

  // ── Supernovas ───────────────────────────────────────────
  const supernovas = [];
  function spawnSupernova() {
    const hues = [30, 200, 270, 0, 55]; // orange, cyan, purple, red, yellow
    supernovas.push({
      x: rand(canvas.width * 0.1, canvas.width * 0.9),
      y: rand(canvas.height * 0.1, canvas.height * 0.9),
      r: 0,
      maxR: rand(60, 140),
      hue: hues[randInt(0, hues.length)],
      alpha: 1,
      speed: rand(0.8, 1.8)
    });
  }
  setInterval(spawnSupernova, rand(3000, 6000));

  function drawSupernovas() {
    for (let i = supernovas.length - 1; i >= 0; i--) {
      const s = supernovas[i];
      s.r += s.speed;
      s.alpha = 1 - s.r / s.maxR;
      if (s.alpha <= 0) { supernovas.splice(i, 1); continue; }

      // Outer ring
      ctx.globalAlpha = s.alpha * 0.8;
      ctx.strokeStyle = `hsl(${s.hue}, 100%, 70%)`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.stroke();

      // Inner glow
      const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 0.6);
      glow.addColorStop(0, `hsla(${s.hue}, 100%, 90%, ${s.alpha * 0.4})`);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.globalAlpha = 1;
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 0.6, 0, Math.PI * 2);
      ctx.fill();

      // Spikes
      ctx.globalAlpha = s.alpha * 0.6;
      ctx.strokeStyle = `hsl(${s.hue}, 100%, 85%)`;
      ctx.lineWidth = 1;
      for (let a = 0; a < 8; a++) {
        const ang = (a / 8) * Math.PI * 2;
        const inner = s.r * 0.85;
        const outer = s.r * 1.3;
        ctx.beginPath();
        ctx.moveTo(s.x + Math.cos(ang) * inner, s.y + Math.sin(ang) * inner);
        ctx.lineTo(s.x + Math.cos(ang) * outer, s.y + Math.sin(ang) * outer);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }
  }

  // ── Nebula (static soft blobs) ───────────────────────────
  function drawNebula() {
    const blobs = [
      { x: 0.15, y: 0.3,  r: 180, h: 240, a: 0.04 },
      { x: 0.75, y: 0.6,  r: 220, h: 280, a: 0.035 },
      { x: 0.5,  y: 0.85, r: 160, h: 200, a: 0.03 },
    ];
    blobs.forEach(b => {
      const g = ctx.createRadialGradient(
        b.x * canvas.width, b.y * canvas.height, 0,
        b.x * canvas.width, b.y * canvas.height, b.r
      );
      g.addColorStop(0, `hsla(${b.h}, 80%, 50%, ${b.a})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(b.x * canvas.width, b.y * canvas.height, b.r, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  // ── Main loop ─────────────────────────────────────────────
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawNebula();
    drawStars();
    drawShooters();
    drawSupernovas();
    requestAnimationFrame(loop);
  }
  loop();
})();
// ── End space animation ──────────────────────────────────────
</script>

<script>
  let config = null;

  // Load config.json on page start
  async function loadConfig() {
    try {
      const res = await fetch('./config.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      config = await res.json();
      buildRows();
      if (config.last_updated) {
        document.getElementById('configUpdated').textContent = 'Config updated: ' + config.last_updated;
      }
      document.getElementById('btnText').textContent = 'Run All Wishlists';
      document.getElementById('runBtn').disabled = false;
    } catch (err) {
      const el = document.getElementById('loadError');
      el.textContent = 'Could not load config.json: ' + err.message +
        '\n\nMake sure config.json is in the same folder and you are serving over HTTP (not file://).';
      el.style.display = 'block';
      document.getElementById('btnText').textContent = 'Config failed to load';
    }
  }

  function buildRows() {
    const container = document.getElementById('results');
    container.innerHTML = '';
    config.requests.forEach((req, i) => {
      const row = document.createElement('div');
      row.className = 'result-row';
      row.id = 'row-' + i;
      row.innerHTML = `
        <div class="status-icon" id="icon-${i}">○</div>
        <div class="result-body">
          <div class="result-name">${req.name}</div>
          <div class="result-detail" id="detail-${i}">Ready</div>
        </div>`;
      container.appendChild(row);
    });
  }

  function setRow(i, state, icon, detail) {
    const row = document.getElementById('row-' + i);
    row.className = 'result-row ' + state;
    document.getElementById('icon-' + i).textContent = icon;
    document.getElementById('detail-' + i).textContent = detail;
  }

  async function runAll() {
    const btn = document.getElementById('runBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Sending...';

    // Mark all as loading
    config.requests.forEach((_, i) => setRow(i, 'loading', '⋯', 'Sending...'));

    const tasks = config.requests.map((req, i) => sendRequest(req, i));
    await Promise.allSettled(tasks);

    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Run All Wishlists';
    document.getElementById('timestamp').textContent =
      'Last run: ' + new Date().toLocaleString();
  }

  async function sendRequest(req, i) {
    try {
      const res = await fetch(req.url, {
        method: 'POST',
        headers: {
          'Authorization': config.bearer_token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(req.items)
      });

      const text = await res.text();
      let detail;
      try { detail = JSON.stringify(JSON.parse(text), null, 2); }
      catch { detail = text || '(empty response)'; }

      if (res.ok) {
        setRow(i, 'success', '✅', 'Success (' + res.status + ')\n' + detail);
      } else {
        setRow(i, 'error', '❌', 'Error ' + res.status + ' ' + res.statusText + '\n' + detail);
      }
    } catch (err) {
      setRow(i, 'error', '❌', 'Network error: ' + err.message);
    }
  }

  loadConfig();
</script>
</body>
</html>
